name: Deploy to Render

# Paused during development — no Render service exists yet, so this failed
# on every push to main since the repo's first commit (there's no deploy
# hook URL to configure until a Render service actually exists to generate
# one). Switch back to `push: branches: [main]` once RENDER_DEPLOY_HOOK_URL
# is set as a real repo secret; until then, trigger manually if needed.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Verify deploy webhook is configured
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not set"
            exit 1
          fi

      - name: Trigger Render deploy
        run: |
          curl -sf \
            --max-time 30 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -w "\nHTTP status: %{http_code}\n" \
            -o /dev/null